<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e2d45;
    --accent: #00d4aa;
    --red: #ff4757;
    --green: #00d4aa;
    --text: #e2e8f0;
    --muted: #64748b;
    --header-bg: #0d1424;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    width: 200px;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  button {
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  button:hover { opacity: 0.85; }

  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 18px;
    color: var(--accent);
  }

  .exchange {
    font-size: 11px;
    color: var(--muted);
    background: #1a2640;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .company-name {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .change.up { color: var(--green); }
  .change.down { color: var(--red); }

  .card-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .metric { font-size: 11px; }
  .metric-label { color: var(--muted); margin-bottom: 2px; }
  .metric-value { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  .table-section { margin-top: 40px; }

  .section-title {
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 14px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid #0f1a2b;
    font-family: 'IBM Plex Mono', monospace;
  }

  tr:hover td { background: #111f35; }

  .up { color: var(--green); }
  .down { color: var(--red); }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .error-msg {
    background: #1a0a0a;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 20px;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MARKET_WATCH</div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
    <span id="lastUpdated"></span>
    <button class="secondary" onclick="loadStocks()" style="padding:6px 14px;font-size:12px;">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="controls">
    <input type="text" id="tickerInput" placeholder="Enter ticker (e.g. AAPL)" 
           onkeydown="if(event.key==='Enter')fetchSingle()" />
    <button onclick="fetchSingle()">Look Up</button>
    <span style="color:var(--muted);font-size:12px;margin-left:8px;">
      Auto-refreshes every 60s
    </span>
  </div>

  <div id="errorBox" class="error-msg" style="display:none;"></div>

  <div class="section-title">Live Positions</div>
  <div class="grid" id="cardsGrid">
    <div class="loading">⏳ Loading stock data...<br><br>
      <small>Make sure your FastAPI server is running at localhost:8000</small>
    </div>
  </div>

  <div class="table-section">
    <div class="section-title">Data Table</div>
    <table id="stockTable">
      <thead>
        <tr>
          <th>Ticker</th><th>Name</th><th>Price</th>
          <th>Change</th><th>Change %</th>
          <th>Open</th><th>High</th><th>Low</th>
          <th>Volume</th><th>Exchange</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<script>
const API = "http://localhost:8000";
let refreshTimer;

async function loadStocks() {
  try {
    const res = await fetch(`${API}/stocks`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    setStatus(true, `${Object.keys(data.stocks).length} stocks loaded`);
    hideError();
    renderCards(data.stocks);
    renderTable(data.stocks);
    document.getElementById("lastUpdated").textContent = 
      "Updated: " + new Date().toLocaleTimeString();

  } catch (err) {
    setStatus(false, "API Offline");
    showError(`Cannot connect to API at ${API}. Is FastAPI running? Run: uvicorn api.main:app --reload`);
  }
}

async function fetchSingle() {
  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  if (!ticker) return;

  try {
    const res = await fetch(`${API}/stock/${ticker}`);
    if (res.status === 404) { showError(`Ticker "${ticker}" not found.`); return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const data = await res.json();
    hideError();
    
    // Add to display
    const stocks = { [ticker]: data };
    renderCards(stocks, true);
  } catch (err) {
    showError(`Error fetching ${ticker}: ${err.message}`);
  }
}

function renderCards(stocks, prepend = false) {
  const grid = document.getElementById("cardsGrid");
  if (!prepend) grid.innerHTML = "";

  for (const [ticker, s] of Object.entries(stocks)) {
    const isUp = s.change >= 0;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <div class="ticker">${s.ticker}</div>
        <div class="exchange">${s.exchange}</div>
      </div>
      <div class="company-name">${s.name}</div>
      <div class="price">${s.currency} ${fmt(s.price)}</div>
      <div class="change ${isUp ? 'up' : 'down'}">
        ${isUp ? '▲' : '▼'} ${Math.abs(s.change)} (${isUp ? '+' : ''}${s.change_pct}%)
      </div>
      <div class="card-metrics">
        <div class="metric"><div class="metric-label">Open</div><div class="metric-value">${fmt(s.open)}</div></div>
        <div class="metric"><div class="metric-label">Volume</div><div class="metric-value">${fmtVol(s.volume)}</div></div>
        <div class="metric"><div class="metric-label">52W High</div><div class="metric-value">${fmt(s['52w_high'])}</div></div>
        <div class="metric"><div class="metric-label">52W Low</div><div class="metric-value">${fmt(s['52w_low'])}</div></div>
      </div>`;
    
    if (prepend) grid.prepend(card);
    else grid.appendChild(card);
  }
}

function renderTable(stocks) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  for (const [ticker, s] of Object.entries(stocks)) {
    const isUp = s.change >= 0;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="color:var(--accent);font-weight:600">${s.ticker}</td>
      <td style="color:var(--muted)">${s.name.substring(0, 25)}${s.name.length>25?'...':''}</td>
      <td>${fmt(s.price)}</td>
      <td class="${isUp?'up':'down'}">${isUp?'+':''}${s.change}</td>
      <td class="${isUp?'up':'down'}">${isUp?'+':''}${s.change_pct}%</td>
      <td>${fmt(s.open)}</td>
      <td>${fmt(s.high)}</td>
      <td>${fmt(s.low)}</td>
      <td>${fmtVol(s.volume)}</td>
      <td style="color:var(--muted)">${s.exchange}</td>`;
    tbody.appendChild(tr);
  }
}

function fmt(n) { return n ? Number(n).toFixed(2) : "N/A"; }
function fmtVol(n) {
  if (!n) return "N/A";
  if (n >= 1e9) return (n/1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1) + "K";
  return n;
}

function setStatus(online, msg) {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  dot.className = "status-dot" + (online ? "" : " offline");
  txt.textContent = msg;
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "⚠ " + msg;
  box.style.display = "block";
}

function hideError() {
  document.getElementById("errorBox").style.display = "none";
}

// Initial load
loadStocks();

// Auto-refresh every 60 seconds
setInterval(loadStocks, 60000);
</script>
</body>
</html>
